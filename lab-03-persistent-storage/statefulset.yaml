apiVersion: v1
kind: Service
metadata:
  name: datastore
spec:
  ports:
    - port: 80
      name: web
  clusterIP: None
  selector:
    app: datastore
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datastore
spec:
  serviceName: "datastore"
  replicas: 3
  selector:
    matchLabels:
      app: datastore
  template:
    metadata:
      labels:
        app: datastore
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Write the pod's hostname to its persistent volume on startup
              echo "Hello from $(hostname) at $(date)" >> /data/history.txt
              echo "Pod $(hostname) is running with persistent storage"
              # Keep the pod running
              while true; do sleep 3600; done
          volumeMounts:
            - name: data
              mountPath: /data
  # This is the key StatefulSet feature for storage!
  # Each pod automatically gets its own PersistentVolumeClaim
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2 # EKS default storage class (EBS volumes)
        resources:
          requests:
            storage: 1Gi
