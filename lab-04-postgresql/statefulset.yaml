apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      name: postgres
  clusterIP: None
  selector:
    app: postgres
---
# A regular service for connecting to the primary (postgres-0).
# In a production setup you would use a tool like Patroni to dynamically
# update which pod the "primary" service points to. For this lab, the
# service routes to all pods and you connect to postgres-0 explicitly.
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres-headless"
  replicas: 3 # 1 primary + 2 replicas
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # --- initContainers ---
      # An initContainer runs ONCE before the main container starts.
      # Here it handles replica bootstrapping: copying data from the
      # primary so the replica has a starting point for replication.
      initContainers:
        - name: setup
          image: postgres:16
          command: ["bash", "/scripts/setup.sh"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: scripts
              mountPath: /scripts
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_HOST_AUTH_METHOD
              value: md5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # readinessProbe: Kubernetes uses this to know when the pod is
          # ready to receive traffic. pg_isready checks if PostgreSQL is
          # accepting connections.
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
          # livenessProbe: Kubernetes uses this to detect if the pod is
          # stuck or crashed. If it fails, the pod gets restarted.
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: scripts
          configMap:
            name: postgres-config
            items:
              - key: setup.sh
                path: setup.sh
            defaultMode: 0755
        - name: init-scripts
          configMap:
            name: postgres-config
            items:
              - key: init.sql
                path: init.sql
            defaultMode: 0755
  # --- volumeClaimTemplates ---
  # Each pod gets its own PersistentVolumeClaim (and therefore its own
  # EBS volume). This is the StatefulSet feature that gives every
  # database instance its own dedicated storage.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi
