apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  # Primary server configuration
  primary.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 3
    hot_standby = on

  # Client authentication configuration
  pg_hba.conf: |
    # Allow local connections without password
    local   all             all                                     trust
    # Allow password-based connections from any pod
    host    all             all             0.0.0.0/0               md5
    # Allow replication connections from any pod
    host    replication     replicator      0.0.0.0/0               md5

  # Setup script that runs in an initContainer before PostgreSQL starts.
  #
  # On the PRIMARY (postgres-0):
  #   - Does nothing special; lets PostgreSQL initialize normally.
  #   - After PostgreSQL starts, the entrypoint scripts handle init.
  #
  # On REPLICAS (postgres-1, postgres-2, ...):
  #   - Waits for the primary to be accepting connections.
  #   - Runs pg_basebackup to copy the primary's data.
  #   - Creates a standby.signal file so PostgreSQL starts in replica mode.
  setup.sh: |
    #!/bin/bash
    set -e

    PGDATA="/var/lib/postgresql/data/pgdata"

    if [ "$(hostname)" = "postgres-0" ]; then
      echo "This is the PRIMARY (postgres-0) — no special init needed."
    else
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        echo "This is a REPLICA ($(hostname)) — bootstrapping from primary..."
        rm -rf "$PGDATA"/*

        echo "Waiting for primary (postgres-0) to be ready..."
        until PGPASSWORD=replpass pg_isready -h postgres-0.postgres-headless -U postgres -q; do
          echo "  Primary not ready yet. Retrying in 2 seconds..."
          sleep 2
        done

        echo "Primary is ready. Running pg_basebackup..."
        PGPASSWORD=replpass pg_basebackup \
          -h postgres-0.postgres-headless \
          -U replicator \
          -D "$PGDATA" \
          -Fp -Xs -P -R

        echo "Replication bootstrap complete."
      else
        echo "Data directory already exists — ensuring standby.signal is present."
        touch "$PGDATA/standby.signal"
      fi
    fi

  # Initialization SQL that runs ONLY on the primary, ONLY on first boot.
  # PostgreSQL automatically runs any .sql files in /docker-entrypoint-initdb.d/
  # when the data directory is empty (first start).
  init.sql: |
    -- Create a user for replication (replicas connect as this user)
    CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD 'replpass';

    -- Create the QuickBite application database
    CREATE DATABASE quickbite;

    -- Connect to quickbite and create the schema
    \c quickbite

    CREATE TABLE restaurants (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      cuisine VARCHAR(50),
      rating DECIMAL(2,1),
      created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE customers (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      email VARCHAR(100),
      address TEXT,
      created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE orders (
      id SERIAL PRIMARY KEY,
      customer_id INTEGER REFERENCES customers(id),
      restaurant_id INTEGER REFERENCES restaurants(id),
      items TEXT NOT NULL,
      total_amount DECIMAL(10,2) NOT NULL,
      status VARCHAR(20) DEFAULT 'placed',
      created_at TIMESTAMP DEFAULT NOW()
    );

    -- Seed restaurant data
    INSERT INTO restaurants (name, cuisine, rating) VALUES
      ('Thai Palace', 'Thai', 4.5),
      ('Pizza Planet', 'Italian', 4.2),
      ('Sushi Express', 'Japanese', 4.8),
      ('Burger Barn', 'American', 4.0);

    -- Seed customer data
    INSERT INTO customers (name, email, address) VALUES
      ('Alice Chen', 'alice@example.com', '123 Main St'),
      ('Bob Martinez', 'bob@example.com', '456 Oak Ave'),
      ('Carol Johnson', 'carol@example.com', '789 Pine Rd');
