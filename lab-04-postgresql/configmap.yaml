apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  # Primary server configuration
  primary.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 3
    hot_standby = on

  # Replica configuration
  pg_hba.conf: |
    # Allow replication connections from any pod in the cluster
    local   all             all                                     trust
    host    all             all             0.0.0.0/0               md5
    host    replication     replicator      0.0.0.0/0               md5

  # Init script for the primary
  init-primary.sh: |
    #!/bin/bash
    set -e

    # Only run on the primary (pod-0)
    if [ "$(hostname)" = "postgres-0" ]; then
      echo "Initializing as PRIMARY"

      # Create replication user if it doesn't exist
      psql -U postgres -c "
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'replicator') THEN
            CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD 'replpass';
          END IF;
        END
        \$\$;
      "

      # Create the QuickBite database and tables
      psql -U postgres -c "CREATE DATABASE quickbite;" 2>/dev/null || true
      psql -U postgres -d quickbite -c "
        CREATE TABLE IF NOT EXISTS restaurants (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          cuisine VARCHAR(50),
          rating DECIMAL(2,1),
          created_at TIMESTAMP DEFAULT NOW()
        );

        CREATE TABLE IF NOT EXISTS customers (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          email VARCHAR(100),
          address TEXT,
          created_at TIMESTAMP DEFAULT NOW()
        );

        CREATE TABLE IF NOT EXISTS orders (
          id SERIAL PRIMARY KEY,
          customer_id INTEGER REFERENCES customers(id),
          restaurant_id INTEGER REFERENCES restaurants(id),
          items TEXT NOT NULL,
          total_amount DECIMAL(10,2) NOT NULL,
          status VARCHAR(20) DEFAULT 'placed',
          created_at TIMESTAMP DEFAULT NOW()
        );

        -- Seed some restaurant data
        INSERT INTO restaurants (name, cuisine, rating) VALUES
          ('Thai Palace', 'Thai', 4.5),
          ('Pizza Planet', 'Italian', 4.2),
          ('Sushi Express', 'Japanese', 4.8),
          ('Burger Barn', 'American', 4.0)
        ON CONFLICT DO NOTHING;

        -- Seed some customer data
        INSERT INTO customers (name, email, address) VALUES
          ('Alice Chen', 'alice@example.com', '123 Main St'),
          ('Bob Martinez', 'bob@example.com', '456 Oak Ave'),
          ('Carol Johnson', 'carol@example.com', '789 Pine Rd')
        ON CONFLICT DO NOTHING;
      "
      echo "Primary initialization complete — QuickBite database ready"
    fi

  # Setup script that runs before PostgreSQL starts
  setup.sh: |
    #!/bin/bash
    set -e

    PGDATA="/var/lib/postgresql/data/pgdata"

    if [ "$(hostname)" = "postgres-0" ]; then
      # PRIMARY: Use standard init
      echo "Starting as PRIMARY (postgres-0)"
    else
      # REPLICA: Bootstrap from primary if data dir is empty
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        echo "Starting as REPLICA ($(hostname)) — bootstrapping from primary..."
        rm -rf "$PGDATA"/*

        PGPASSWORD=replpass pg_basebackup \
          -h postgres-0.postgres-headless \
          -U replicator \
          -D "$PGDATA" \
          -Fp -Xs -P -R

        echo "Replication bootstrap complete"
      else
        # Ensure standby.signal exists for restarts
        touch "$PGDATA/standby.signal"
      fi
    fi
