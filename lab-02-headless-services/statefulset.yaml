apiVersion: v1
kind: Service
metadata:
  name: web-headless
  labels:
    app: web
spec:
  ports:
    - port: 80
      name: web
  clusterIP: None # Headless — no cluster IP, DNS resolves directly to pod IPs
  selector:
    app: web
---
# A regular (ClusterIP) service for comparison
apiVersion: v1
kind: Service
metadata:
  name: web-regular
  labels:
    app: web
spec:
  ports:
    - port: 80
      name: web
  selector:
    app: web
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  serviceName: "web-headless" # Must match the headless service name
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
              name: web
